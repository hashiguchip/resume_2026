    <path d="M11 11V8.5C11 5.46 13.46 3 16.5 3h0C19.54 3 22 5.46 22 8.5V11" stroke="#0066CC" stroke-width="3" stroke-linecap="round"/>
    <!-- 人物: 頭 -->
    <circle cx="16" cy="19" r="3.2" fill="white"/>
