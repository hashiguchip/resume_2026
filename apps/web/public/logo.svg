    <rect x="42" y="8" width="5" height="28" rx="1"/>
    <rect x="62" y="8" width="5" height="28" rx="1"/>
    <rect x="47" y="18" width="15" height="5" rx="1"/>
    <!-- ・(ドット) -->
    <circle cx="79" cy="22" r="3"/>
