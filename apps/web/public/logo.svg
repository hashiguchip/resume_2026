    <rect x="90" y="8" width="5" height="28" rx="1"/>
    <path d="M95 8h12c5.5 0 10 4.5 10 10s-4.5 10-10 10H95V23h12c2.76 0 5-2.24 5-5s-2.24-5-5-5H95V8z" fill="#0066CC"/>
    <path d="M104 23l13 13h-7l-12-13h6z" fill="#0066CC"/>
  </g>
  <!-- サブテキスト: キャリア -->
  <rect x="126" y="33" width="0" height="0"/>
