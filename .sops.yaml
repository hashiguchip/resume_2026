# SOPS encryption rules for this repository.
#
# `apps/api/seed/app-data.sops.bin` は SOPS binary mode + age で暗号化して commit する。
# binary mode はファイル全体を単一 blob として暗号化するため、キー名・配列長など
# の構造メタデータが一切漏れない (通常モードは値だけ暗号化しキー名は平文で残る)。
#
# 編集: `sops --input-type binary --output-type binary apps/api/seed/app-data.sops.bin`
#   → 透過 decrypt → エディタで YAML を編集 → 保存時に自動 encrypt
# 必要な setup: apps/api/README.md "Seed データ" セクション参照
#
# age public key を 1 つ列挙する。private key は開発者の dev machine だけが持つ。
# key の rotation 手順は SOPS docs (`sops updatekeys`) を参照。
creation_rules:
  - path_regex: apps/api/seed/app-data\.sops\.bin$
    age: age1lz72v9y6qkhuy72te5q30jp05n88l0z7yp8m6vgt4nf7d0fg94tqr89rdy
