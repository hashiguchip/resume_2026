# SOPS encryption rules for this repository.
#
# `apps/api/seed/*.yaml` (excluding *.example) は age で暗号化して commit する。
# 編集: `sops apps/api/seed/portfolio.yaml`
#   → 透過 decrypt → エディタで編集 → 自動 encrypt
# 必要な setup: README "Seed データ" セクション参照
#
# age public key を 1 つ列挙する。private key は開発者の dev machine だけが持つ。
# key の rotation 手順は SOPS docs (`sops updatekeys`) を参照。
#
# path_regex `[^.]+\.yaml$` は basename にドットを含まない yaml だけを matche する。
# `portfolio.yaml`        → match (encrypt 対象)
# `portfolio.yaml.example` → no match (.example は平文のまま)
# (SOPS は Go の RE2 を使うため、negative lookahead `(?!...)` は使えない)
creation_rules:
  - path_regex: apps/api/seed/[^.]+\.yaml$
    age: age1lz72v9y6qkhuy72te5q30jp05n88l0z7yp8m6vgt4nf7d0fg94tqr89rdy
