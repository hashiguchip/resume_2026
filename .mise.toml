[tools]
node = "24.14.0"
go = "1.25"
"aqua:apple/pkl" = "0.31.1"
"aqua:biomejs/biome" = "2.4.4"
"aqua:cocogitto/cocogitto" = "7.0.0"
"aqua:ariga/atlas" = "1.1.0"
"aqua:getsops/sops" = "3.12.2"
"aqua:FiloSottile/age" = "1.3.1"
hk = "1.41.0"

[tasks.dev]
description = "Start web dev server"
run = "npm run dev"
dir = "apps/web"

[tasks.build]
description = "Build web app"
run = "npm run build"
dir = "apps/web"

[tasks.test]
description = "Run web tests"
run = "npm run test"
dir = "apps/web"

[tasks.typecheck]
description = "TypeScript type check"
run = "npm run typecheck"
dir = "apps/web"

[tasks.lint]
description = "Run biome check"
run = "biome check ."

[tasks."lint:fix"]
description = "Run biome check with auto-fix"
run = "biome check --write ."

[tasks.format]
description = "Format with biome"
run = "biome format --write ."

[tasks."dev:api"]
description = "Start API dev server"
run = "go run ."
dir = "apps/api"

[tasks."test:api"]
description = "Run API tests (testcontainers integration tests need Docker daemon)"
run = "go vet ./... && go test -v ./..."
dir = "apps/api"

[tasks."ent:generate"]
description = "Regenerate ent client from schema definitions"
run = "go generate ./ent"
dir = "apps/api"

[tasks."ent:diff"]
description = "Generate a new ent migration into apps/api/migrations (usage: mise run ent:diff <name>)"
# 流れ:
#   1. docker compose の postgres サービス内に空の migration_shadow DB を作り直す
#      (前回 diff の残骸をクリーンにするため drop → create)
#   2. ent の NamedDiff を shadow DB に対して走らせ、migration ファイルを書き出す
# 前提: docker compose up -d postgres が実行済みであること。
run = '''
set -euo pipefail
docker compose exec -T postgres psql -U postgres -d postgres -c 'DROP DATABASE IF EXISTS migration_shadow' >/dev/null
docker compose exec -T postgres psql -U postgres -d postgres -c 'CREATE DATABASE migration_shadow' >/dev/null
MIGRATION_DEV_URL="postgres://postgres:postgres@localhost:5432/migration_shadow?sslmode=disable" \
  go run ./cmd/migrate "$@"
'''
dir = "apps/api"

[tasks."migrate:up"]
description = "Apply pending migrations to DATABASE_URL via atlas CLI"
run = "atlas migrate apply --env local"
dir = "apps/api"

[tasks."seed:apply"]
description = "Apply SOPS-encrypted seed YAML to DATABASE_URL"
# 前提:
#   - DATABASE_URL が設定されていること
#   - SOPS_AGE_KEY_FILE が age private key を指していること
#     (default は ~/.config/sops/age/keys.txt)
#   - apps/api/seed/app-data.yaml が SOPS で暗号化済みで存在すること
run = "go run ./cmd/seed seed/app-data.yaml"
dir = "apps/api"

[tasks."codegen:api"]
description = "Generate apps/api/openapi.yaml from huma operations"
run = "go run ./cmd/openapi openapi.yaml"
dir = "apps/api"

[tasks."codegen:web"]
description = "Generate apps/web/src/services/api/schema.generated.ts from openapi.yaml"
run = "npx openapi-typescript ../api/openapi.yaml -o src/services/api/schema.generated.ts"
dir = "apps/web"

[tasks.codegen]
description = "Run all codegen (API spec → TS schema)"
depends = ["codegen:api", "codegen:web"]
