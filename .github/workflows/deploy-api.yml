name: Deploy API to Leapcell

on:
  push:
    branches: [main]
    paths: ["apps/api/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null .

      # Leapcell サイトから手動デプロイ
