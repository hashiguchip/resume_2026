name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('apps/web/package-lock.json') }}
      - run: npm ci
        working-directory: apps/web
      - run: biome check .
      - run: npm run typecheck
        working-directory: apps/web
      - run: npm test
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ vars.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_DATA_API_URL: ${{ vars.NEXT_PUBLIC_DATA_API_URL }}

  check-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: go vet ./...
      - run: go test ./...
